name: Deploy Disputes Frontend

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:
        inputs:
            skip-cache:
                description: "Skip deployment cache and force redeploy"
                type: boolean
                default: false

permissions:
    contents: read
    statuses: write
    id-token: write
    pull-requests: write

concurrency:
    group: deploy-disputes-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        name: Build
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install and build
              run: pnpm install && pnpm turbo build --filter=@polkadot/disputes-frontend

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: disputes-frontend-build
                  path: src/apps/disputes-frontend/dist
                  retention-days: 1

    comment-deploying:
        needs: build
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        name: Comment Deploying
        steps:
            - name: Comment deployment in progress
              uses: marocchino/sticky-pull-request-comment@v2
              with:
                  header: deploy-disputes-preview
                  message: |
                      ## Disputes Preview Deployment

                      | App | Status |
                      |:---:|:------:|
                      | Disputes Frontend | Deploying... |

                      <sub>Deployment in progress. [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>

    deploy:
        needs: build
        name: Deploy
        uses: paritytech/dotns-sdk/.github/workflows/deploy.yml@main
        with:
            basename: disputes
            mode: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && 'production' || 'preview' }}
            artifact-name: disputes-frontend-build
            register-base: true
            skip-cache: ${{ inputs.skip-cache || false }}
            max-retries: 3
        secrets:
            dotns-mnemonic: ${{ secrets.MNEMONIC }}

    comment-success:
        needs: [build, deploy]
        if: github.event_name == 'pull_request' && success()
        runs-on: ubuntu-latest
        name: Comment Success
        steps:
            - name: Comment on PR
              uses: marocchino/sticky-pull-request-comment@v2
              with:
                  header: deploy-disputes-preview
                  message: |
                      ## Disputes Preview Ready!

                      | App | Status | Preview |
                      |:---:|:------:|:-------:|
                      | **Disputes Frontend** | Ready | [**Visit Preview**](${{ needs.deploy.outputs.url }}) |

                      <details>
                      <summary>Deployment Details</summary>

                      | Detail | Value |
                      |--------|-------|
                      | **Domain** | `${{ needs.deploy.outputs.fqdn }}` |
                      | **CID** | `${{ needs.deploy.outputs.cid }}` |
                      | **Commit** | `${{ github.event.pull_request.head.sha }}` |

                      </details>

    comment-failure:
        needs: [build, deploy]
        if: github.event_name == 'pull_request' && failure()
        runs-on: ubuntu-latest
        name: Comment Failure
        steps:
            - name: Comment on PR
              uses: marocchino/sticky-pull-request-comment@v2
              with:
                  header: deploy-disputes-preview
                  message: |
                      ## Disputes Deployment Failed

                      | Stage | Status |
                      |:------|:------:|
                      | **Build** | ${{ needs.build.result == 'success' && 'Built' || 'Failed' }} |
                      | **Deploy** | ${{ needs.deploy.result == 'success' && 'Deployed' || 'Failed' }} |

                      [**View workflow run**](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
