<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Tracker - System Basic Example</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        h1 {
            color: #00d4ff;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 10px;
        }
        .status {
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .status.connected {
            background: #0a3d0a;
            border: 1px solid #0f0;
        }
        .status.disconnected {
            background: #3d0a0a;
            border: 1px solid #f00;
        }
        .status.loading {
            background: #3d3d0a;
            border: 1px solid #ff0;
        }
        .section {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section h2 {
            margin-top: 0;
            color: #00d4ff;
            font-size: 18px;
        }
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #0f0f23;
            color: #fff;
            font-size: 16px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #00d4ff;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        button.primary {
            background: #00d4ff;
            color: #000;
        }
        button.primary:hover:not(:disabled) {
            background: #00a8cc;
        }
        button.secondary {
            background: #333;
            color: #fff;
        }
        button.secondary:hover:not(:disabled) {
            background: #444;
        }
        button.danger {
            background: #ff4444;
            color: #fff;
        }
        button.danger:hover:not(:disabled) {
            background: #cc3333;
        }
        .items-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .item-card {
            background: #0f0f23;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .item-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .item-id {
            background: #333;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            color: #888;
        }
        .item-name {
            font-weight: 600;
            font-size: 16px;
        }
        .item-count {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
            min-width: 60px;
            text-align: center;
        }
        .item-actions {
            display: flex;
            gap: 8px;
        }
        .item-actions button {
            padding: 8px 16px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .log {
            background: #0f0f23;
            border-radius: 8px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #222;
        }
        .log-entry:last-child {
            border-bottom: none;
        }
        .log-entry.success {
            color: #0f0;
        }
        .log-entry.error {
            color: #f00;
        }
        .log-entry.info {
            color: #888;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .stat {
            background: #0f0f23;
            padding: 15px 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #00d4ff;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <h1>🗂️ Item Tracker</h1>

    <div id="status" class="status loading">
        Connecting to local node...
    </div>

    <div class="section">
        <h2>📊 Stats</h2>
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="total-items">-</div>
                <div class="stat-label">Total Items</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="total-count">-</div>
                <div class="stat-label">Total Count</div>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>➕ Create Item</h2>
        <div class="form-row">
            <input type="text" id="item-name" placeholder="Enter item name..." />
            <button class="primary" id="create-btn" disabled>Create</button>
        </div>
    </div>

    <div class="section">
        <h2>📦 Items</h2>
        <div id="items-list" class="items-list">
            <div class="empty-state">Loading items...</div>
        </div>
    </div>

    <div class="section">
        <h2>📝 Activity Log</h2>
        <div id="log" class="log">
            <div class="log-entry info">Initializing...</div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
